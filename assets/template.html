<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTIST NAME</title>
    <link rel="icon" type="image/png" href="../assets/images/BFA_LOGO.png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/artist-page.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Gajraj+One&family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <a href="../index.html">
                <img src="../assets/images/BFA_LOGO.png" alt="RE-MIX DIVISION">
            </a>
        </div>
        <ul class="nav-links">
            <li><a class="primary-text" href="../about.html">ABOUT</a></li>
            <li><a class="primary-text" href="../artists.html">ARTISTS</a></li>
        </ul>
    </header>

    <main class="main-container">
        <article class="artist-page">

            <a class="back-link" href="../artists.html">← BACK TO ARTISTS</a>

            <!-- HERO: portrait on left, info on right -->
            <div class="artist-hero">

                <img class="artist-portrait" src="../assets/artists_portrait/FILENAME.png" alt="ARTIST NAME">

                <div class="artist-info">
                    <h1>ARTIST NAME</h1>
                    <p class="secondary-text">( PRONOUNS )</p>

                    <!-- FORMAT: Platform: @handle | Platform: @handle | Platform: Link -->
                    <!-- Remove any that don't apply -->
                    <p class="secondary-text">
                        <b>Instagram:</b> <a href="https://instagram.com/HANDLE" target="_blank" rel="noopener">@HANDLE</a> <br>
                        <b>LinkedIn:</b> <a href="https://linkedin.com/in/HANDLE" target="_blank" rel="noopener">@HANDLE</a> <br>
                        <b>YouTube:</b> <a href="https://youtube.com/@HANDLE" target="_blank" rel="noopener">@HANDLE</a> <br>
                        <b>Portfolio:</b> <a href="https://PORTFOLIO_URL" target="_blank" rel="noopener">LINK</a>
                    </p>

                    <h2>About the Artist</h2>
                    <p class="secondary-text">ARTIST BIO</p>
                </div>

            </div>

            <hr class="artist-divider">

            <!-- ARTWORK — duplicate this block for each piece -->
            <section class="artist-work">
                <h2>ARTWORK TITLE</h2>

                <p class="secondary-text">ARTIST STATEMENT</p>

                <!-- Single image: use work-images single -->
                <!-- Multiple images: use work-images (two-column grid) -->
                <div class="work-images single">
                    <img src="../assets/works/FILENAME.png" alt="ARTWORK TITLE">
                    <!-- <video src="../assets/works/" controls alt=""></video> -->
                </div>
            </section>

        </article>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-logos">
            <img src="../assets/images/san_jose_state_spartans_logo_secondary_2018_sportslogosnet-9520.png" alt="SJSU">
            <img src="../assets/images/Hammer_Theatre_Logo-small.png" alt="Hammer Theater">
        </div>
        <div class="footer-socials">
            <a class="footer-social" href="https://www.instagram.com/divisionremix" target="_blank" rel="noopener">
                <img class="footer-icon" src="../assets/images/instagram.png" alt="Instagram">
            </a>
        </div>
    </footer>

</body>

</html>
