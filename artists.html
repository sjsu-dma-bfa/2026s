<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTISTS</title>
    <link rel="icon" type="image/png" href="assets/images/BFA_LOGO.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/artists.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Gajraj+One&family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <a href="index.html">
                <img src="assets/images/BFA_LOGO.png" alt="RE-MIX DIVISION">
            </a>
        </div>
        <ul class="nav-links">
            <li><a class="primary-text" href="about.html">ABOUT</a></li>
            <li><a class="primary-text" href="artists.html">ARTISTS</a></li>
        </ul>
    </header>

    <main class="main-container">
        <div class="artist-drum-wrapper">
            <p class="drum-title">— Select an Artist —</p>

            <div class="drum-stage">
                <!-- Drum + nav stacked vertically -->
                <div class="drum-nav-drum">
                    <div class="drum-nav">
                        <button id="btn-up" aria-label="Previous artist">▲</button>
                    </div>

                    <!-- 3D Drum -->
                    <div class="drum-container" id="drumContainer">
                    <div class="drum-selector drum-selector-top"></div>
                    <div class="drum-selector-zone"></div>
                    <div class="drum-selector drum-selector-bottom"></div>
                    <div class="drum-mask-top"></div>
                    <div class="drum-mask-bottom"></div>
                    <div class="drum-cylinder" id="drumCylinder"></div>
                    </div><!-- /drum-container -->

                    <div class="drum-nav">
                        <button id="btn-down" aria-label="Next artist">▼</button>
                    </div>
                </div><!-- /drum-nav-drum -->

                <!-- Artist Detail Panel — JS populates .artist-star + .artist-star-content -->
                <div class="artist-detail" id="artistDetail">
                    <div class="artist-star-glow"></div>
                    <div class="artist-detail-placeholder">
                        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="40" cy="30" r="16" stroke-width="2" />
                            <path d="M10 70 Q10 50 40 50 Q70 50 70 70" stroke-width="2" />
                        </svg>
                        <span>Scroll the drum to select an artist</span>
                    </div>
                </div>
            </div>

            <div class="drum-footer">
                <div class="drum-counter" id="drumCounter">1 / 32</div>
                <div class="keyboard-hint"><kbd>←</kbd> <kbd>→</kbd> arrow keys · scroll · swipe</div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-logos">
            <img src="assets/images/san_jose_state_spartans_logo_secondary_2018_sportslogosnet-9520.png" alt="SJSU">
            <img src="assets/images/Hammer_Theatre_Logo-small.png" alt="Hammer Theater">
        </div>
        <div class="footer-socials">
            <a class="footer-social" href="https://www.instagram.com/divisionremix" target="_blank" rel="noopener">
                <img class="footer-icon" src="assets/images/instagram.png" alt="Instagram">
            </a>
        </div>
    </footer>

    <div id="shootingStarsOverlay"></div>
    <script src="assets/js/artists.js"></script>
</body>

</html>
